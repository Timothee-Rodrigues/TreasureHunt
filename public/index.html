<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Application de chasse au trésor hors-ligne">
  <meta name="theme-color" content="#4CAF50">
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  
  <title>Chasse au trésor</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="container">
    <div id="app">
      <!-- The app will be rendered here -->
    </div>  
    <footer>
      <p class="offline-indicator">
        <span id="offline-status">📶 Online</span>
      </p>
    </footer>
  </div>
  
  <script type="module" src="./dist/app.js"></script>
  
  <script>
    // Simple offline indicator
    function updateOnlineStatus() {
      const status = document.getElementById('offline-status');
      if (status) {
        if (navigator.onLine) {
          status.textContent = '📶 En ligne';
          status.className = 'online';
        } else {
          status.textContent = '📴 Hors ligne';
          status.className = 'offline';
        }
      }
    }
    
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();
  </script>
</body>
</html>
